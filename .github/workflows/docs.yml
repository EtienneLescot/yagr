name: Documentation

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'res/**'
      - 'scripts/sync-brand-assets.mjs'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'res/**'
      - 'scripts/sync-brand-assets.mjs'
      - '.github/workflows/docs.yml'
  # Allow manual triggering
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        working-directory: ./docs
        run: npm ci

      - name: TypeScript type checking
        working-directory: ./docs
        run: npm run typecheck

      - name: Build documentation
        working-directory: ./docs
        run: npm run build

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/build

      - name: Validate built site
        run: |
          if [ ! -d "./docs/build" ]; then
            echo "Documentation build failed - build directory not found"
            exit 1
          fi

          echo "Checking for broken internal links..."
          find ./docs/build -name "*.html" -type f ! -name "404.html" | head -20 | while read file; do
            echo "Checking $file"
            if grep -q "Page Not Found" "$file"; then
              echo "ERROR: Found 'Page Not Found' in $file"
              exit 1
            fi
          done
          
          echo "Documentation build validation passed"

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: docs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4